<script>

// Laden van savegame
let save = JSON.parse(localStorage.getItem("mikuSave")) || {};

let notes = save.notes || 0;
let nps = save.nps || 0;

let clickPower = save.clickPower || 1;
let clickCost = save.clickCost || 50;

const upgrades = save.upgrades || {
    creampie: { cost: 10, power: 1 },
    piemelseks: { cost: 100, power: 5 },
    stage: { cost: 1000, power: 20 },
    tour: { cost: 10000, power: 100 }
};

const noteDisplay = document.getElementById('note-count');
const npsDisplay = document.getElementById('nps-count');
const mikuBtn = document.getElementById('miku-btn');

// Voeg click upgrade knop toe als die nog niet bestaat
const clickBtn = document.createElement("button");

clickBtn.innerHTML =
    `Better Clicks (Cost:
    <span id="click-cost">${clickCost}</span>)`;

clickBtn.style.marginTop = "15px";

clickBtn.onclick = buyClickUpgrade;

document
.getElementById("game-container")
.appendChild(clickBtn);

// Klikken op Miku
mikuBtn.addEventListener('click', (e) => {

    notes += clickPower;

    createParticle(e);

    updateDisplay();
    updateButtons();

});

// Upgrade kopen
function buyUpgrade(type) {

    const upg = upgrades[type];

    if (!upg) return;

    if (notes >= upg.cost) {

        notes -= upg.cost;

        nps += upg.power;

        upg.cost =
        Math.floor(upg.cost * 1.25);

        updateDisplay();
        updateButtons();

        saveGame();
    }
}

// Click upgrade
function buyClickUpgrade() {

    if (notes >= clickCost) {

        notes -= clickCost;

        clickPower++;

        clickCost =
        Math.floor(clickCost * 1.5);

        document.getElementById(
            "click-cost"
        ).textContent = clickCost;

        updateDisplay();

        saveGame();
    }
}

// Opslaan
function saveGame() {

    localStorage.setItem(
        "mikuSave",
        JSON.stringify({

            notes,
            nps,

            clickPower,
            clickCost,

            upgrades

        })
    );
}

// Reset save
function resetSave() {

    if (
        confirm(
            "Weet je zeker dat je je save wilt verwijderen?"
        )
    ) {

        localStorage.removeItem(
            "mikuSave"
        );

        location.reload();
    }
}

// Automatische inkomsten
setInterval(() => {

    notes += nps / 10;

    updateDisplay();
    updateButtons();

}, 100);

// Auto-save
setInterval(saveGame, 5000);

function updateDisplay() {

    noteDisplay.textContent =
    Math.floor(notes);

    npsDisplay.textContent =
    nps;
}

function updateButtons() {

    const keys =
    Object.keys(upgrades);

    keys.forEach((key, index) => {

        const upg =
        upgrades[key];

        const btn =
        document.getElementById(
            `upg-${index + 1}`
        );

        if (!btn) return;

        btn.innerHTML =
        `${key.toUpperCase()}
        (Cost: ${upg.cost})
        <br>
        +${upg.power} Note/sec`;

        btn.disabled =
        notes < upg.cost;
    });
}

// Klik-effect
function createParticle(e) {

    const particle =
    document.createElement('div');

    particle.innerText =
    "+" + clickPower;

    particle.style.position =
    'absolute';

    particle.style.left =
    e.clientX + 'px';

    particle.style.top =
    e.clientY + 'px';

    particle.style.color =
    '#00fbff';

    particle.style.fontSize =
    '24px';

    particle.style.fontWeight =
    'bold';

    particle.style.pointerEvents =
    'none';

    particle.style.zIndex =
    '100';

    document.body.appendChild(
        particle
    );

    let y = e.clientY;
    let opacity = 1;

    const anim =
    setInterval(() => {

        y -= 3;

        opacity -= 0.03;

        particle.style.top =
        y + 'px';

        particle.style.opacity =
        opacity;

        if (opacity <= 0) {

            clearInterval(anim);

            particle.remove();
        }

    }, 16);
}

// Eerste update
updateDisplay();
updateButtons();

</script>
