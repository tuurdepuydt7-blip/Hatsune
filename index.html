<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miku Music Clicker</title>

<style>
* {
    cursor: url("https://img.icons8.com/?size=256w&id=48416&format=png") 16 16, auto !important;
}

body {
    background-color: #333;
    color: #00fbff;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

#login {
    text-align: center;
}

#game-container {
    display: none;
    text-align: center;
    background: #222;
    padding: 25px;
    border-radius: 20px;
    border: 3px solid #00fbff;
    box-shadow: 0 0 20px #00fbff;
}

.stats {
    font-size: 20px;
    margin: 10px;
}

.shop button {
    margin: 5px;
    padding: 8px;
    background: #00fbff;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

#leaderboard {
    margin-top: 15px;
    background: #111;
    padding: 10px;
    border-radius: 10px;
    text-align: left;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>Google Login Required</h2>
    <button id="loginBtn">Login</button>
</div>

<!-- GAME -->
<div id="game-container">

    <h1>Miku Clicker 🎵</h1>

    <div class="stats">
        Notes: <span id="notes">0</span><br>
        NPS: <span id="nps">0</span>
    </div>

    <img id="miku" width="250"
    src="https://art.ngfiles.com/images/3032000/3032840_alphakibi_miku-titties.png">

    <div class="shop">
        <button onclick="buy('dancer')">Backup Dancer (10)</button>
        <button onclick="buy('mic')">Pro Mic (100)</button>
        <button onclick="buy('stage')">Neon Stage (1000)</button>
        <button onclick="buy('tour')">World Tour (10000)</button>
    </div>

    <button onclick="resetSave()">Reset</button>

    <h3>Leaderboard</h3>
    <div id="leaderboard">Loading...</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDocs,
collection,
orderBy,
query
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAh_8PNPkXvOAHxg3TsTM3ULvenvl4ttKI",
authDomain: "klik-98fc8.firebaseapp.com",
projectId: "klik-98fc8",
storageBucket: "klik-98fc8.firebasestorage.app",
messagingSenderId: "825491323098",
appId: "1:825491323098:web:bcc3ea387b8c93037acde3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user;
let notes = 0;
let nps = 0;

const upgrades = {
dancer: { cost: 10, power: 1 },
mic: { cost: 100, power: 5 },
stage: { cost: 1000, power: 20 },
tour: { cost: 10000, power: 100 }
};

// LOGIN
document.getElementById("loginBtn").onclick = async () => {
const provider = new GoogleAuthProvider();
await signInWithPopup(auth, provider);
};

onAuthStateChanged(auth, async (u) => {
if (!u) return;

user = u;
document.getElementById("login").style.display = "none";
document.getElementById("game-container").style.display = "block";

loadSave();
loadLeaderboard();
});

// CLICK
document.getElementById("miku").onclick = (e) => {
notes++;
spawnParticle(e);
update();
save();
};

// BUY UPGRADES
window.buy = function(type) {
let upg = upgrades[type];

if (notes >= upg.cost) {
notes -= upg.cost;
nps += upg.power;
upg.cost = Math.floor(upg.cost * 1.25);
update();
save();
}
};

// RESET
window.resetSave = function() {
localStorage.removeItem("mikuSave");
notes = 0;
nps = 0;
update();
save();
};

// SAVE LOCAL + CLOUD
function save() {
localStorage.setItem("mikuSave", JSON.stringify({ notes, nps }));

setDoc(doc(db, "scores", user.uid), {
name: user.displayName,
score: Math.floor(notes)
});
}

// LOAD LOCAL
function loadSave() {
let save = JSON.parse(localStorage.getItem("mikuSave"));
if (save) {
notes = save.notes;
nps = save.nps;
}
update();
}

// UPDATE LOOP
setInterval(() => {
notes += nps / 10;
update();
save();
}, 100);

// LEADERBOARD
async function loadLeaderboard() {
const q = query(collection(db, "scores"), orderBy("score", "desc"));
const snap = await getDocs(q);

let html = "";
snap.forEach(d => {
let data = d.data();
html += `<div>${data.name}: ${data.score}</div>`;
});

document.getElementById("leaderboard").innerHTML = html;
}

setInterval(loadLeaderboard, 5000);

// UI
function update() {
document.getElementById("notes").innerText = Math.floor(notes);
document.getElementById("nps").innerText = nps;
}

function spawnParticle(e) {
const p = document.createElement("div");
p.innerText = "♫";
p.style.position = "absolute";
p.style.left = e.clientX + "px";
p.style.top = e.clientY + "px";
p.style.color = "#00fbff";
document.body.appendChild(p);

let y = e.clientY;
let op = 1;

let i = setInterval(() => {
y -= 2;
op -= 0.03;
p.style.top = y + "px";
p.style.opacity = op;
if (op <= 0) {
clearInterval(i);
p.remove();
}
}, 16);
}

update();
</script>

</body>
</html>
