<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miku Music Clicker</title>

<style>
* {
    cursor: url("https://img.icons8.com/?size=256w&id=48416&format=png") 16 16, auto !important;
}

body {
    background-color: #333;
    color: #00fbff;
    font-family: Arial, sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

#login {
    text-align: center;
}

#game-container {
    display: none;
    text-align: center;
    background: #222;
    padding: 25px;
    border-radius: 15px;
    border: 3px solid #00fbff;
    box-shadow: 0 0 20px #00fbff;
}

button {
    padding: 10px;
    background: #00fbff;
    border: none;
    font-weight: bold;
    cursor: pointer;
    margin: 5px;
}

#leaderboard {
    margin-top: 20px;
    text-align: left;
    background: #111;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>Login met Google</h2>
    <button id="loginBtn">Sign in</button>
</div>

<!-- GAME -->
<div id="game-container">

    <h1>Miku Clicker 🎵</h1>

    <p>Notes: <span id="notes">0</span></p>

    <img id="miku" src="https://art.ngfiles.com/images/3032000/3032840_alphakibi_miku-titties.png" width="250">

    <div>
        <button onclick="clickNote()">Click</button>
    </div>

    <h3>Leaderboard</h3>
    <div id="leaderboard">Loading...</div>

</div>

<script type="module">
// Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { 
    getAuth, 
    GoogleAuthProvider, 
    signInWithPopup,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
    getFirestore,
    doc,
    setDoc,
    getDocs,
    collection,
    orderBy,
    query
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

// JOUW CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAh_8PNPkXvOAHxg3TsTM3ULvenvl4ttKI",
  authDomain: "klik-98fc8.firebaseapp.com",
  projectId: "klik-98fc8",
  storageBucket: "klik-98fc8.firebasestorage.app",
  messagingSenderId: "825491323098",
  appId: "1:825491323098:web:bcc3ea387b8c93037acde3",
  measurementId: "G-B9X9G4MH7G"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;
let notes = 0;

// LOGIN
document.getElementById("loginBtn").onclick = async () => {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
};

// AUTH STATE
onAuthStateChanged(auth, (u) => {
    if (u) {
        user = u;
        document.getElementById("login").style.display = "none";
        document.getElementById("game-container").style.display = "block";
        loadLeaderboard();
    }
});

// GAME
window.clickNote = async function() {
    notes++;
    document.getElementById("notes").innerText = notes;

    await setDoc(doc(db, "scores", user.uid), {
        name: user.displayName,
        score: notes
    });
};

// LEADERBOARD
async function loadLeaderboard() {
    const q = query(collection(db, "scores"), orderBy("score", "desc"));
    const snap = await getDocs(q);

    let html = "";
    snap.forEach(doc => {
        const d = doc.data();
        html += `<div>${d.name}: ${d.score}</div>`;
    });

    document.getElementById("leaderboard").innerHTML = html;
}

// refresh leaderboard
setInterval(loadLeaderboard, 5000);

</script>

</body>
</html>
