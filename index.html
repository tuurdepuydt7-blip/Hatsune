<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Clicker</title>

<style>
body{
    background:#333;
    color:#00fbff;
    font-family:Segoe UI,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

#game{
    text-align:center;
    background:#222;
    padding:30px;
    border-radius:20px;
    border:4px solid #00fbff;
    box-shadow:0 0 20px #00fbff;
}

#clicker{
    width:250px;
    height:250px;
    border-radius:20px;
    cursor:pointer;
    transition:.1s;
}

#clicker:active{
    transform:scale(.95);
}

.shop{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:20px;
}

button{
    border:none;
    padding:10px;
    border-radius:8px;
    background:#00fbff;
    font-weight:bold;
    cursor:pointer;
}

button:disabled{
    background:#555;
    color:#999;
}

.particle{
    position:absolute;
    pointer-events:none;
    color:#00fbff;
    font-weight:bold;
}
</style>
</head>
<body>

<div id="game">

<h1>🎵 Music Clicker</h1>

<h2 id="notes">0</h2>

<div>
Notes/sec:
<span id="nps">0</span>
</div>

<br>

<img
id="clicker"
src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Hatsune_Miku_V4X.svg/512px-Hatsune_Miku_V4X.svg.png"
alt="Click"
>

<br><br>

<button onclick="buyClickUpgrade()">
Better Clicks
(<span id="clickCost">50</span>)
</button>

<div class="shop">

<button id="upg1" onclick="buyUpgrade('dancer')"></button>
<button id="upg2" onclick="buyUpgrade('mic')"></button>
<button id="upg3" onclick="buyUpgrade('stage')"></button>
<button id="upg4" onclick="buyUpgrade('tour')"></button>

</div>

<br>

<button onclick="resetSave()">
Reset Save
</button>

</div>

<script>

let save =
JSON.parse(
localStorage.getItem("musicSave")
) || {};

let notes =
save.notes || 0;

let nps =
save.nps || 0;

let clickPower =
save.clickPower || 1;

let clickCost =
save.clickCost || 50;

let upgrades =
save.upgrades || {

    dancer:{
        cost:10,
        power:1
    },

    mic:{
        cost:100,
        power:5
    },

    stage:{
        cost:1000,
        power:20
    },

    tour:{
        cost:10000,
        power:100
    }

};

const noteEl =
document.getElementById("notes");

const npsEl =
document.getElementById("nps");

const clickCostEl =
document.getElementById("clickCost");

const clicker =
document.getElementById("clicker");

clicker.addEventListener(
"click",
e => {

    notes += clickPower;

    particle(e);

    update();

}
);

function buyUpgrade(name){

    const upg =
    upgrades[name];

    if(notes < upg.cost)
    return;

    notes -= upg.cost;

    nps += upg.power;

    upg.cost =
    Math.floor(
    upg.cost * 1.25
    );

    update();
}

function buyClickUpgrade(){

    if(notes < clickCost)
    return;

    notes -= clickCost;

    clickPower++;

    clickCost =
    Math.floor(
    clickCost * 1.5
    );

    update();
}

function update(){

    noteEl.textContent =
    Math.floor(notes);

    npsEl.textContent =
    nps;

    clickCostEl.textContent =
    clickCost;

    const names =
    Object.keys(upgrades);

    names.forEach(
    (name,index)=>{

        const upg =
        upgrades[name];

        const btn =
        document.getElementById(
        "upg"+(index+1)
        );

        btn.innerHTML =
        `${name}<br>
        Cost: ${upg.cost}<br>
        +${upg.power}/s`;

        btn.disabled =
        notes < upg.cost;
    });

    save();
}

function save(){

    localStorage.setItem(
    "musicSave",

    JSON.stringify({

        notes,
        nps,
        clickPower,
        clickCost,
        upgrades

    })
    );
}

function resetSave(){

    localStorage.removeItem(
    "musicSave"
    );

    location.reload();
}

function particle(e){

    const p =
    document.createElement("div");

    p.className =
    "particle";

    p.innerText =
    "+"+clickPower;

    p.style.left =
    e.clientX+"px";

    p.style.top =
    e.clientY+"px";

    document.body
    .appendChild(p);

    let y =
    e.clientY;

    let op = 1;

    const anim =
    setInterval(()=>{

        y -= 2;

        op -= .03;

        p.style.top =
        y+"px";

        p.style.opacity =
        op;

        if(op <= 0){

            clearInterval(anim);

            p.remove();
        }

    },16);
}

setInterval(()=>{

    notes +=
    nps / 10;

    update();

},100);

setInterval(
save,
5000
);

update();

</script>

</body>
</html>
