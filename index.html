<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miku Clicker Firebase</title>

<style>
* {
    cursor: url("https://img.icons8.com/?size=256w&id=48416&format=png") 16 16, auto !important;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #333;
    color: #00fbff;
    font-family: Arial;
    overflow: hidden;
}

/* LOGIN */
#login-screen {
    position: fixed;
    inset: 0;
    background: #111;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

/* GAME */
#game {
    text-align: center;
    background: #222;
    padding: 25px;
    border-radius: 15px;
    border: 3px solid #00fbff;
    box-shadow: 0 0 15px #00fbff;
    display: none;
}

.stats {
    font-size: 22px;
    margin: 15px 0;
}

button {
    background: #00fbff;
    border: none;
    padding: 10px;
    margin: 5px;
    font-weight: bold;
    cursor: pointer;
}

#leaderboard {
    margin-top: 15px;
    background: #111;
    padding: 10px;
    border-radius: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
    <h2>Login required</h2>
    <button id="loginBtn">Sign in with Google</button>
</div>

<!-- GAME -->
<div id="game">
    <h1>MIKU CLICKER 🎵</h1>

    <div class="stats">
        Notes: <span id="notes">0</span><br>
        NPS: <span id="nps">0</span>
    </div>

    <button id="clickBtn">CLICK MIKU</button>

    <div>
        <button onclick="buy(1)">Dancer (10)</button>
        <button onclick="buy(2)">Mic (100)</button>
    </div>

    <div id="leaderboard">
        Loading leaderboard...
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

import { getFirestore, doc, setDoc, getDocs, collection, query, orderBy, limit }
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAh_8PNPkPkvOAHxg3TsTM3ULvenvl4ttKI",
  authDomain: "klik-98fc8.firebaseapp.com",
  projectId: "klik-98fc8",
  storageBucket: "klik-98fc8.firebasestorage.app",
  messagingSenderId: "825491323098",
  appId: "1:825491323098:web:bcc3ea387b8c93037acde3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;
let notes = 0;
let nps = 0;

/* LOGIN */
document.getElementById("loginBtn").onclick = async () => {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
};

/* AUTH STATE (STABIEL) */
onAuthStateChanged(auth, (u) => {
    if (u) {
        user = u;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("game").style.display = "block";
        loadLeaderboard();
    } else {
        user = null;
        document.getElementById("login-screen").style.display = "flex";
        document.getElementById("game").style.display = "none";
    }
});

/* CLICK */
document.getElementById("clickBtn").onclick = () => {
    notes++;
    update();
};

/* UPGRADES */
window.buy = (type) => {
    if (type === 1 && notes >= 10) {
        notes -= 10;
        nps += 1;
    }
    if (type === 2 && notes >= 100) {
        notes -= 100;
        nps += 5;
    }
    update();
};

/* LOOP */
setInterval(() => {
    if (!user) return;
    notes += nps / 10;
    update();
}, 100);

/* SAVE */
async function save() {
    if (!user) return;

    await setDoc(doc(db, "leaderboard", user.uid), {
        name: user.displayName,
        notes: Math.floor(notes),
        nps: nps
    });
}

/* LEADERBOARD */
async function loadLeaderboard() {
    const q = query(collection(db, "leaderboard"), orderBy("notes", "desc"), limit(10));
    const snap = await getDocs(q);

    let html = "<b>Leaderboard</b><br>";
    snap.forEach(d => {
        html += `${d.data().name} - ${d.data().notes}<br>`;
    });

    document.getElementById("leaderboard").innerHTML = html;
}

/* UI */
function update() {
    document.getElementById("notes").innerText = Math.floor(notes);
    document.getElementById("nps").innerText = nps;

    save();
    loadLeaderboard();
}
</script>

</body>
</html>
