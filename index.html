<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miku Music Clicker</title>
<style>
*{cursor:url("https://img.icons8.com/?size=256w&id=48416&format=png") 16 16,auto!important;}
body{background:#333;color:#00fbff;font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;overflow:hidden}
#game-container{text-align:center;background:#222;padding:30px;border-radius:20px;border:4px solid #00fbff;box-shadow:0 0 20px #00fbff;max-width:1000px}
.shop{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:20px}
button{background:#00fbff;color:#222;border:none;padding:10px;font-weight:bold;border-radius:8px}
button:disabled{background:#555;color:#888}
#miku-btn{width:300px;height:300px;object-fit:contain}
.reset-btn{background:#ff4a4a;color:white;margin-top:15px}
</style>
</head>
<body>
<div id="game-container">
<h1>MIKU MUSIC CLICKER 🎵</h1>

<div class="stats">
<div>Notes: <span id="note-count">0</span></div>
<div>Notes/sec: <span id="nps-count">0</span></div>
</div>

<img id="miku-btn" src="https://art.ngfiles.com/images/3032000/3032840_alphakibi_miku-titties.png?f1675755475">

<div class="shop" id="shop"></div>

<button class="reset-btn" onclick="resetSave()">🗑 Reset Save</button>
</div>

<script>
let save = JSON.parse(localStorage.getItem("mikuSave"));

let notes = save?.notes || 0;
let nps = save?.nps || 0;

const upgrades = save?.upgrades || {
dancer:{cost:10,power:1,name:"Backup Dancer"},
mic:{cost:100,power:5,name:"Pro Microphone"},
stage:{cost:1000,power:20,name:"Neon Stage"},
tour:{cost:10000,power:100,name:"World Tour"},
producer:{cost:50000,power:500,name:"Music Producer"},
concert:{cost:250000,power:2500,name:"Mega Concert"},
album:{cost:1000000,power:10000,name:"Hit Album"},
stadium:{cost:5000000,power:50000,name:"Sold Out Stadium"},
satellite:{cost:25000000,power:250000,name:"Satellite Broadcast"},
ai:{cost:100000000,power:1000000,name:"AI Composer"},
moon:{cost:500000000,power:5000000,name:"Moon Concert"},
mars:{cost:2500000000,power:25000000,name:"Mars Tour"},
galaxy:{cost:10000000000,power:100000000,name:"Galaxy Tour"},
universe:{cost:50000000000,power:500000000,name:"Universal Idol"}
};

const noteDisplay=document.getElementById("note-count");
const npsDisplay=document.getElementById("nps-count");

function formatNumber(num){
if(num>=1e12)return (num/1e12).toFixed(1)+"T";
if(num>=1e9)return (num/1e9).toFixed(1)+"B";
if(num>=1e6)return (num/1e6).toFixed(1)+"M";
if(num>=1e3)return (num/1e3).toFixed(1)+"K";
return Math.floor(num);
}

document.getElementById("miku-btn").addEventListener("click",(e)=>{
notes++;
createParticle(e);
updateDisplay();
});

function buyUpgrade(type){
const upg=upgrades[type];
if(notes>=upg.cost){
notes-=upg.cost;
nps+=upg.power;
upg.cost=Math.floor(upg.cost*1.25);
updateDisplay();
saveGame();
}
}

function updateDisplay(){
noteDisplay.textContent=formatNumber(notes);
npsDisplay.textContent=formatNumber(nps);
updateButtons();
}

function updateButtons(){
const shop=document.getElementById("shop");
shop.innerHTML="";

for(const key in upgrades){
const upg=upgrades[key];
const btn=document.createElement("button");
btn.innerHTML=`${upg.name}<br>Cost: ${formatNumber(upg.cost)}<br>+${formatNumber(upg.power)}/sec`;
btn.disabled=notes<upg.cost;
btn.onclick=()=>buyUpgrade(key);
shop.appendChild(btn);
}
}

function saveGame(){
localStorage.setItem("mikuSave",JSON.stringify({notes,nps,upgrades}));
}

function resetSave(){
localStorage.removeItem("mikuSave");
location.reload();
}

setInterval(()=>{
notes+=nps/10;
updateDisplay();
},100);

setInterval(saveGame,5000);

function createParticle(e){
const p=document.createElement("div");
p.innerText="♫";
p.style.position="absolute";
p.style.left=e.clientX+"px";
p.style.top=e.clientY+"px";
p.style.color="#00fbff";
document.body.appendChild(p);

let y=e.clientY;
let o=1;

const anim=setInterval(()=>{
y-=2;
o-=0.03;
p.style.top=y+"px";
p.style.opacity=o;
if(o<=0){
clearInterval(anim);
p.remove();
}
},16);
}

updateDisplay();
</script>
</body>
</html>
