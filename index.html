<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miku Music Clicker</title>

    <style>
        * {
            cursor: url("https://img.icons8.com/?size=256w&id=48416&format=png") 16 16, auto !important;
        }

        body {
            background-color: #333;
            color: #00fbff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            text-align: center;
            background: #222;
            padding: 30px;
            border-radius: 20px;
            border: 4px solid #00fbff;
            box-shadow: 0 0 20px #00fbff;
        }

        h1 {
            margin-top: 0;
            text-shadow: 0 0 10px #00fbff;
        }

        .stats {
            font-size: 24px;
            margin: 20px 0;
            font-weight: bold;
        }

        #miku-btn {
            width: 300px;
            height: 300px;
            object-fit: contain;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }

        #miku-btn:active {
            transform: scale(0.95);
        }

        .shop {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        button {
            background: #00fbff;
            color: #222;
            border: none;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
        }

        button:hover:not(:disabled) {
            background: white;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
        
        .reset-btn {
            background: #ff4a4a;
            color: white;
        }
        .reset-btn:hover {
            background: #ff7878 !important;
        }
    </style>
</head>

<body>

<div id="game-container">

    <h1>MIKU MUSIC CLICKER 🎵</h1>

    <div class="stats">
        <b>Notes:</b><br>
        <span id="note-count">0</span><br>
        <small>Notes per second: <span id="nps-count">0</span></small>
    </div>

    <img
        id="miku-btn"
        src="https://art.ngfiles.com/images/3032000/3032840_alphakibi_miku-titties.png?f1675755475"
        alt="Miku"
    >

    <div class="shop">
        <button id="upg-1" onclick="buyUpgrade('creampie')">
            Backup creampie (Cost: 10)<br>
            +1 Note/sec
        </button>

        <button id="upg-2" onclick="buyUpgrade('piemelseks')">
            Pro Microphone (Cost: 100)<br>
            +5 Notes/sec
        </button>

        <button id="upg-3" onclick="buyUpgrade('stage')">
            Neon Stage (Cost: 1000)<br>
            +20 Notes/sec
        </button>

        <button id="upg-4" onclick="buyUpgrade('tour')">
            World Tour (Cost: 10000)<br>
            +100 Notes/sec
        </button>
    </div>

    <button class="reset-btn" onclick="resetSave()">🗑 Reset Save</button>
</div>

<script>
// Laden van savegame
let save = JSON.parse(localStorage.getItem("mikuSave"));

let notes = save?.notes || 0;
let nps = save?.nps || 0;

const upgrades = save?.upgrades || {
    creampie: { cost: 10, power: 1 },
    piemelskes: { cost: 100, power: 5 },
    stage: { cost: 1000, power: 20 },
    tour: { cost: 10000, power: 100 }
};

const noteDisplay = document.getElementById('note-count');
const npsDisplay = document.getElementById('nps-count');
const mikuBtn = document.getElementById('miku-btn');

// Handmatig klikken op Miku
mikuBtn.addEventListener('click', (e) => {
    notes += 1;
    createParticle(e);
    updateDisplay();
    updateButtons();
});

// Upgrade kopen logic
function buyUpgrade(type) {
    const upg = upgrades[type];
    if (notes >= upg.cost) {
        notes -= upg.cost;
        nps += upg.power;
        upg.cost = Math.floor(upg.cost * 1.25); // Maak de volgende duurder
        
        updateDisplay();
        updateButtons();
        saveGame();
    }
}

// Opslaan
function saveGame() {
    localStorage.setItem("mikuSave", JSON.stringify({
        notes,
        nps,
        upgrades
    }));
}

// Reset save
function resetSave() {
    if (confirm("Weet je zeker dat je je save wilt verwijderen?")) {
        localStorage.removeItem("mikuSave");
        location.reload();
    }
}

// Automatische inkomsten per 100ms (soepelere overgang)
setInterval(() => {
    notes += nps / 10;
    updateDisplay();
    updateButtons();
}, 100);

// Auto-save elke 5 seconden
setInterval(saveGame, 5000);

function updateDisplay() {
    noteDisplay.textContent = Math.floor(notes);
    npsDisplay.textContent = nps;
}

function updateButtons() {
    const keys = Object.keys(upgrades);
    keys.forEach((key, index) => {
        const upg = upgrades[key];
        const btn = document.getElementById(`upg-${index + 1}`);
        if (btn) {
            btn.innerHTML = `${key.toUpperCase()} (Cost: ${upg.cost})<br>+${upg.power} Note/sec`;
            btn.disabled = notes < upg.cost;
        }
    });
}

// Klik effecten (Muzieknoten)
function createParticle(e) {
    const particle = document.createElement('div');
    particle.innerText = '♫';
    particle.style.position = 'absolute';
    particle.style.left = e.clientX + 'px';
    particle.style.top = e.clientY + 'px';
    particle.style.color = '#00fbff';
    particle.style.fontSize = '24px';
    particle.style.pointerEvents = 'none';
    particle.style.zIndex = '100';

    document.body.appendChild(particle);

    let x = e.clientX;
    let y = e.clientY;
    let opacity = 1;

    const anim = setInterval(() => {
        y -= 2;
        x += Math.random() * 2 - 1;
        opacity -= 0.03;

        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        particle.style.opacity = opacity;

        if (opacity <= 0) {
            clearInterval(anim);
            particle.remove();
        }
    }, 16);
}

// Eerste update bij laden
updateDisplay();
updateButtons();

</script>
</body>
</html>
